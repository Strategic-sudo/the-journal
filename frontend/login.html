<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JOURNAL ADMIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --void:#020409; --g:#00ff44; --c:#00ffff; --r:#ff3300;
      --mono:'Share Tech Mono',monospace; --title:'Orbitron',monospace;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;background:var(--void);color:#fff;font-family:var(--mono);overflow:hidden;cursor:crosshair}
    canvas#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
    .scan{position:fixed;inset:0;z-index:1;pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,68,.012) 2px,rgba(0,255,68,.012) 4px);
      animation:scanmove 6s linear infinite}
    @keyframes scanmove{100%{background-position:0 80px}}
    .wrap{position:relative;z-index:10;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
    .panel{
      width:440px;padding:48px 40px 38px;
      border:1px solid rgba(0,255,68,.2);
      background:rgba(0,8,3,.94);
      position:relative;
      box-shadow:0 0 80px rgba(0,0,0,.9),0 0 40px rgba(0,255,68,.03),inset 0 0 60px rgba(0,0,0,.5)
    }
    
    .panel::before,.panel::after{content:'';position:absolute;width:18px;height:18px}
    .panel::before{top:-1px;left:-1px;border-top:2px solid var(--g);border-left:2px solid var(--g)}
    .panel::after{bottom:-1px;right:-1px;border-bottom:2px solid var(--g);border-right:2px solid var(--g)}
    
    .corner-tr,.corner-bl{position:absolute;width:18px;height:18px}
    .corner-tr{top:-1px;right:-1px;border-top:2px solid rgba(0,255,68,.4);border-right:2px solid rgba(0,255,68,.4)}
    .corner-bl{bottom:-1px;left:-1px;border-bottom:2px solid rgba(0,255,68,.4);border-left:2px solid rgba(0,255,68,.4)}

    .pre{font-size:.52rem;letter-spacing:.4em;color:var(--g);opacity:.45;margin-bottom:10px;animation:blink 1.8s step-end infinite}
    @keyframes blink{0%,100%{opacity:.45}50%{opacity:.1}}
    .title{font-family:var(--title);font-size:2rem;font-weight:900;letter-spacing:.3em;color:#fff;margin-bottom:5px;
      text-shadow:0 0 20px rgba(0,255,68,.5),0 0 60px rgba(0,255,68,.2)}
    .sub{font-size:.55rem;letter-spacing:.22em;color:rgba(255,255,255,.2);margin-bottom:38px}

    .field{margin-bottom:20px}
    label{display:block;font-size:.52rem;letter-spacing:.28em;color:rgba(0,255,68,.55);margin-bottom:7px}
    input{
      width:100%;background:rgba(0,255,68,.03);border:1px solid rgba(0,255,68,.18);
      color:#fff;font-family:var(--mono);font-size:.85rem;padding:11px 13px;outline:none;
      transition:border-color .3s,box-shadow .3s;letter-spacing:.05em
    }
    input:focus{border-color:rgba(0,255,68,.55);box-shadow:0 0 18px rgba(0,255,68,.07)}
    input::placeholder{color:rgba(255,255,255,.12)}
    .strength{height:2px;width:0;background:var(--g);transition:width .4s,background .4s;margin-top:5px}

    .btn{
      width:100%;padding:13px;background:transparent;border:1px solid rgba(0,255,68,.38);
      color:var(--g);font-family:var(--mono);font-size:.72rem;letter-spacing:.32em;
      cursor:pointer;transition:all .3s;position:relative;overflow:hidden;margin-top:6px
    }
    .btn::before{
      content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(0,255,68,.09),transparent);transition:left .5s
    }
    .btn:hover::before{left:100%}
    .btn:hover{background:rgba(0,255,68,.07);box-shadow:0 0 22px rgba(0,255,68,.12)}
    .btn:active{transform:scale(.98)}
    .btn:disabled{opacity:.3;pointer-events:none}

    #status{margin-top:18px;font-size:.58rem;letter-spacing:.18em;text-align:center;min-height:16px;transition:all .3s}
    #status.err{color:var(--r)}
    #status.ok{color:var(--g)}

    .notice{font-size:.48rem;letter-spacing:.14em;color:rgba(255,255,255,.1);text-align:center;margin-top:12px}

    .foot{
      margin-top:28px;padding-top:14px;border-top:1px solid rgba(255,255,255,.05);
      display:flex;justify-content:space-between;
      font-size:.48rem;letter-spacing:.18em;color:rgba(255,255,255,.13)
    }
    a.back{color:rgba(0,255,68,.38);text-decoration:none;transition:color .2s;font-size:.48rem;letter-spacing:.18em}
    a.back:hover{color:var(--g)}

    @keyframes shake{
      0%,100%{transform:translateX(0)}
      20%{transform:translateX(-9px)}40%{transform:translateX(9px)}
      60%{transform:translateX(-6px)}80%{transform:translateX(6px)}
    }
  </style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="scan"></div>
<div class="wrap">
  <div class="panel">
    <div class="corner-tr"></div><div class="corner-bl"></div>
    <div class="pre">RESTRICTED ACCESS ADMIN</div>
    <div class="title">JOURNAL</div>
    <div class="sub">AUTHENTICATION REQUIRED</div>

    <div class="field">
      <label for="u">USERNAME</label>
      <input id="u" type="text" placeholder="username" autocomplete="username"
             autocorrect="off" autocapitalize="none" spellcheck="false" maxlength="64"/>
    </div>
    <div class="field">
      <label for="p">PASSWORD</label>
      <input id="p" type="password" placeholder="••••••••" autocomplete="current-password" maxlength="128"/>
      <div class="strength" id="sbar"></div>
    </div>

    <button class="btn" id="btn">AUTHENTICATE</button>
    <div id="status"></div>
    <p class="notice">POSSIBILITY OF LOCKOUT</p>

    <div class="foot">
      <a href="index.html" class="back">← RETURN TO JOURNAL</a>
      <span id="counter">ATTEMPTS: 0 / 5</span>
    </div>
  </div>
</div>
<script>
(()=>{
  'use strict';
  const API='https://the-journal.pavlositpro.workers.dev';
  const MAX=5, LOCK_MS=15*60*1000, K_LOCK='jrn_lock', K_ATT='jrn_att';

  
  const cv=document.getElementById('bg'), ctx=cv.getContext('2d');
  const resize=()=>{cv.width=innerWidth;cv.height=innerHeight};
  resize(); addEventListener('resize',resize);
  const pts=Array.from({length:90},()=>({
    x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.18,
    r:Math.random()*1.1+.2,a:Math.random()*.28+.04
  }));
  (function loop(){
    ctx.clearRect(0,0,cv.width,cv.height);
    pts.forEach(p=>{
      p.x=(p.x+p.vx+cv.width)%cv.width;
      p.y=(p.y+p.vy+cv.height)%cv.height;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(0,255,68,${p.a})`;ctx.fill();
    });
    requestAnimationFrame(loop);
  })();

  
  const pEl=document.getElementById('p'), sbar=document.getElementById('sbar');
  pEl.addEventListener('input',()=>{
    const v=pEl.value; let s=0;
    if(v.length>=8)s+=25; if(v.length>=12)s+=25;
    if(/[A-Z]/.test(v)&&/[a-z]/.test(v))s+=25;
    if(/[^A-Za-z0-9]/.test(v))s+=25;
    sbar.style.width=s+'%';
    sbar.style.background=s<=25?'#ff3300':s<=50?'#ffaa00':'#00ff44';
  });

  
  const getLock=()=>{ const t=parseInt(localStorage.getItem(K_LOCK)||'0'); return t>Date.now()?t:0; };
  const getAtt=()=>parseInt(localStorage.getItem(K_ATT)||'0');
  const addAtt=()=>{
    const n=getAtt()+1; localStorage.setItem(K_ATT,n);
    if(n>=MAX){localStorage.setItem(K_LOCK,Date.now()+LOCK_MS);localStorage.removeItem(K_ATT);}
    return n;
  };
  const clearAtt=()=>{localStorage.removeItem(K_ATT);localStorage.removeItem(K_LOCK);};
  const refreshCtr=()=>{ document.getElementById('counter').textContent=`ATTEMPTS: ${getAtt()} / ${MAX}`; };
  refreshCtr();

  const setStatus=(m,t='')=>{ const e=document.getElementById('status'); e.textContent=m; e.className=t; };
  const sanitise=s=>String(s).trim().slice(0,128);

  
  if(getLock()){
    const rem=Math.ceil((getLock()-Date.now())/60000);
    setStatus(`ACCESS LOCKED — RETRY IN ${rem} MIN`,'err');
    document.getElementById('btn').disabled=true;
  }

  async function login(){
    const btn=document.getElementById('btn');
    if(getLock()){ const rem=Math.ceil((getLock()-Date.now())/60000); setStatus(`LOCKED — ${rem} MIN`,'err'); return; }
    const u=sanitise(document.getElementById('u').value);
    const p=sanitise(pEl.value);
    if(!u||!p){setStatus('BOTH FIELDS REQUIRED','err');return;}
    btn.disabled=true; btn.textContent='◌ AUTHENTICATING...'; setStatus('','');
    try{
      const res=await fetch(`${API}/api/auth/login`,{
        method:'POST',mode:'cors',
        headers:{'Content-Type':'application/json','Accept':'application/json'},
        body:JSON.stringify({username:u,password:p})
      });
      const data=await res.json();
      if(res.ok&&data.token){
        clearAtt();
        sessionStorage.setItem('jrn_token',data.token);
        sessionStorage.setItem('jrn_user',data.username||u);
        setStatus('ACCESS GRANTED — REDIRECTING...','ok');
        btn.textContent='✓ AUTHENTICATED';
        setTimeout(()=>location.href='admin.html',700);
      } else {
        const n=addAtt(); refreshCtr();
        if(n>=MAX){ setStatus('MAX ATTEMPTS — LOCKED 15 MIN','err'); btn.textContent='AUTHENTICATE'; return; }
        setStatus(data.error||`INVALID CREDENTIALS — ${MAX-n} LEFT`,'err');
        btn.disabled=false; btn.textContent='AUTHENTICATE';
        document.querySelector('.panel').style.animation='shake .4s ease';
        setTimeout(()=>document.querySelector('.panel').style.animation='',400);
      }
    } catch(e){
      setStatus('SIGNAL LOST — NETWORK ERROR','err');
      btn.disabled=false; btn.textContent='AUTHENTICATE';
    }
  }

  document.getElementById('btn').addEventListener('click',login);
  document.getElementById('u').addEventListener('keydown',e=>{if(e.key==='Enter')login();});
  pEl.addEventListener('keydown',e=>{if(e.key==='Enter')login();});
})();
</script>
</body>
</html>
