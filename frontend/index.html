<!DOCTYPE html>
<html>
<head>
<title>Blog</title>
</head>

<body>

<h1>Blog</h1>

<div id="posts"></div>

<script>

async function loadPosts(){

const res=await fetch("/api/posts")
const posts=await res.json()

const div=document.getElementById("posts")

div.innerHTML=""

posts.forEach(p=>{

div.innerHTML+=`
<h2>${p.title}</h2>
<p>${p.content}</p>
<hr>
`

})

}

loadPosts()

</script>

</body>
</html>
