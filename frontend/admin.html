<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>JOURNAL</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>

<style>

:root{
--void:#020409;
--g:#00ff44;
--c:#00ffff;
--r:#ff3300;
--b:#00c8ff;
--mono:'Share Tech Mono',monospace;
--title:'Orbitron',monospace;
--body:'Rajdhani',sans-serif;
--bdr:rgba(0,255,68,.14);
--bdr2:rgba(0,255,68,.45);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body{
background:var(--void);
color:#fff;
font-family:var(--body);
min-height:100vh;
overflow-x:hidden
}

nav{
position:sticky;
top:0;
z-index:50;
padding:13px 36px;
background:rgba(2,4,9,.96);
border-bottom:1px solid var(--bdr);
display:flex;
align-items:center;
gap:20px
}

.brand{
font-family:var(--title);
font-size:.85rem;
font-weight:900;
letter-spacing:.3em;
color:var(--g)
}

.nav-sep{color:rgba(255,255,255,.08)}

.nav-sec{
font-family:var(--mono);
font-size:.55rem;
letter-spacing:.2em;
color:rgba(255,255,255,.28)
}

.nav-r{
margin-left:auto;
display:flex;
align-items:center;
gap:14px
}

#nav-user{
font-family:var(--mono);
font-size:.55rem;
letter-spacing:.14em;
color:rgba(0,255,68,.45)
}

.nbtn{
font-family:var(--mono);
font-size:.52rem;
letter-spacing:.18em;
padding:5px 11px;
background:transparent;
border:1px solid rgba(255,51,0,.3);
color:rgba(255,51,0,.65);
cursor:pointer;
text-decoration:none
}

.nbtn.green{
border-color:rgba(0,255,68,.28);
color:rgba(0,255,68,.55)
}

main{
max-width:1080px;
margin:0 auto;
padding:38px 28px;
display:flex;
flex-direction:column;
gap:40px
}

.sh{
display:flex;
align-items:center;
gap:14px;
margin-bottom:18px
}

.sh-title{
font-family:var(--title);
font-size:.7rem;
letter-spacing:.32em;
color:var(--g)
}

.sh-line{
flex:1;
height:1px;
background:linear-gradient(90deg,rgba(0,255,68,.28),transparent)
}

.cbox{
background:rgba(0,8,4,.72);
border:1px solid var(--bdr);
padding:30px
}

.fi{
background:rgba(0,255,68,.03);
border:1px solid rgba(0,255,68,.14);
color:#fff;
font-family:var(--mono);
font-size:.78rem;
padding:9px 11px;
width:100%
}

textarea.fi{
min-height:110px
}

.sbtn{
font-family:var(--mono);
font-size:.62rem;
letter-spacing:.22em;
padding:11px 24px;
background:transparent;
border:1px solid rgba(0,255,68,.38);
color:var(--g);
cursor:pointer
}

table{
width:100%;
border-collapse:collapse
}

th{
font-family:var(--mono);
font-size:.48rem;
letter-spacing:.22em;
padding:9px 12px;
border-bottom:1px solid rgba(0,255,68,.09)
}

td{
padding:13px 12px;
border-bottom:1px solid rgba(255,255,255,.03)
}

.delbtn{
font-family:var(--mono);
font-size:.52rem;
padding:4px 9px;
background:transparent;
border:1px solid rgba(255,51,0,.22);
color:rgba(255,51,0,.48);
cursor:pointer
}

#toasts{
position:fixed;
bottom:26px;
right:26px;
display:flex;
flex-direction:column;
gap:9px
}

.toast{
font-family:var(--mono);
font-size:.55rem;
letter-spacing:.14em;
padding:11px 18px;
border:1px solid;
background:rgba(2,4,9,.97);
opacity:0;
transform:translateX(120px);
transition:.3s
}

.toast.show{
opacity:1;
transform:translateX(0)
}

.toast.ok{border-color:rgba(0,255,68,.45);color:var(--g)}
.toast.err{border-color:rgba(255,51,0,.45);color:var(--r)}

</style>

</head>

<body>

<nav>
<div class="brand">JOURNAL</div>
<span class="nav-sep">|</span>
<div class="nav-sec">ADMIN</div>

<div class="nav-r">
<span id="nav-user"></span>
<a href="index.html" class="nbtn green">VIEW SITE</a>
<button class="nbtn" id="logout">LOGOUT</button>
</div>
</nav>

<main>

<section>

<div class="sh">
<div class="sh-title">CREATE NEW POST</div>
<div class="sh-line"></div>
</div>

<div class="cbox">

<input id="f-title" class="fi" placeholder="Title"/><br><br>

<select id="f-cat" class="fi">
<option>GEOPOLITICS</option>
<option>ECONOMICS</option>
<option>SOCIETY</option>
<option>CYBERSECURITY</option>
<option>HACKING</option>
</select><br><br>

<input id="f-auth" class="fi" placeholder="Author"/><br><br>

<input id="f-exc" class="fi" placeholder="Excerpt"/><br><br>

<textarea id="f-body" class="fi" placeholder="Content"></textarea><br><br>

<button class="sbtn" id="create-btn">TRANSMIT POST</button>

</div>

</section>

<section>

<div class="sh">
<div class="sh-title">ALL POSTS</div>
<div class="sh-line"></div>
<button class="nbtn green" id="refresh-btn">REFRESH</button>
</div>

<table>
<thead>
<tr>
<th>#</th>
<th>TITLE</th>
<th>CATEGORY</th>
<th>AUTHOR</th>
<th>DATE</th>
<th>ACTION</th>
</tr>
</thead>

<tbody id="ptbody">
<tr>
<td colspan="6">Loading...</td>
</tr>
</tbody>

</table>

</section>

</main>

<div id="toasts"></div>

<script>

const API="https://the-journal.pavlositpro.workers.dev"

const TOKEN=sessionStorage.getItem("jrn_token")
const USER=sessionStorage.getItem("jrn_user")||"ADMIN"

if(!TOKEN){
location.href="login.html"
}

document.getElementById("nav-user").textContent="LOGGED IN: "+USER

function toast(msg,type="ok"){
const el=document.createElement("div")
el.className="toast "+type
el.textContent=msg
document.getElementById("toasts").appendChild(el)

setTimeout(()=>{el.classList.add("show")},10)
setTimeout(()=>{el.remove()},3000)
}

async function api(path,opts={}){
const r=await fetch(API+path,{
...opts,
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+TOKEN
}
})

if(r.status==401){
sessionStorage.clear()
location.href="login.html"
}

return r
}

async function loadPosts(){

const res=await api("/api/posts")
const posts=await res.json()

const tbody=document.getElementById("ptbody")

if(!posts.length){
tbody.innerHTML="<tr><td colspan='6'>NO POSTS</td></tr>"
return
}

tbody.innerHTML=posts.map(p=>`
<tr>
<td>${p.id}</td>
<td>${p.title}</td>
<td>${p.category||""}</td>
<td>${p.author||""}</td>
<td>${p.date?p.date.slice(0,10):""}</td>
<td><button class="delbtn" data-id="${p.id}">DELETE</button></td>
</tr>
`).join("")

document.querySelectorAll(".delbtn").forEach(btn=>{
btn.onclick=async()=>{
await api("/api/posts/"+btn.dataset.id,{method:"DELETE"})
toast("Post deleted","ok")
loadPosts()
}
})

}

document.getElementById("create-btn").onclick=async()=>{

const title=document.getElementById("f-title").value
const category=document.getElementById("f-cat").value
const author=document.getElementById("f-auth").value
const excerpt=document.getElementById("f-exc").value
const content=document.getElementById("f-body").value

if(!title||!content){
toast("Title and content required","err")
return
}

await api("/api/posts",{
method:"POST",
body:JSON.stringify({title,category,author,excerpt,content})
})

toast("Post created","ok")

loadPosts()

}

document.getElementById("refresh-btn").onclick=loadPosts

document.getElementById("logout").onclick=()=>{
sessionStorage.clear()
location.href="login.html"
}

loadPosts()

</script>

</body>
</html>
